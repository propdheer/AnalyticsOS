services:
  postgres:
    image: postgres:16
    container_name: analyticsos-postgres
    environment:
      POSTGRES_DB: analyticsos
      POSTGRES_USER: analyticsos
      POSTGRES_PASSWORD: analyticsos
    ports:
      - "5432:5432"
    volumes:
      - analyticsos-postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: analyticsos-backend
    ports:
      - "8000:8000"
    environment:
      ANALYTICSOS_ENV: development
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: analyticsos
      POSTGRES_USER: analyticsos
      POSTGRES_PASSWORD: analyticsos
    depends_on:
      - postgres

volumes:
  analyticsos-postgres-data:
